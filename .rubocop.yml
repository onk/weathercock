AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

Layout/LineLength:
  Max: 160

Gemspec/DevelopmentDependencies:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/WordArray:
  Enabled: false

# Require underscore separators only when 2+ separators are needed (7+ digits).
# Strict: true disallows irregular grouping like 10_000_00.
Style/NumericLiterals:
  MinDigits: 7
  Strict: true

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# RSpec describe blocks are intentionally long; splitting them provides no benefit.
Metrics/BlockLength:
  AllowedPatterns:
    - describe

Metrics/AbcSize:
  Max: 20

Metrics/MethodLength:
  Max: 20
